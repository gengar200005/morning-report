# sector_overrides.yaml
#
# KRX KIND 상장법인목록의 "업종" 필드(KSIC 9차 소분류)를 KRX 공식 KOSPI 22업종
# 으로 환원하는 매핑 + 종목 단위 오버라이드.
#
# 배경: ADR-003 Amendment 2026-04-23 (pykrx 인덱스 API 장애 대응).
# 원래는 pykrx 자동 분류 사용 예정이었으나 API 다운으로 KIND 기반 환원 채택.

