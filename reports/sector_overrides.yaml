# sector_overrides.yaml
#
# KRX KIND 상장법인목록의 "업종" 필드(KSIC 9차 소분류)를 KRX 공식 KOSPI 22업종
# 으로 환원하는 매핑 + 종목 단위 오버라이드.
#
# 배경: ADR-003 Amendment 2026-04-23 (pykrx 인덱스 API 장애 대응).
# 원래는 pykrx 자동 분류 사용 예정이었으나 API 다운으로 KIND 기반 환원 채택.

# ─────────────────────────────────────────────────────────────────────────
# 1. KSIC → KOSPI 22업종 자동 매핑
#    (2026-04-23 기준 universe 160종목에서 등장한 58종 KSIC 에 대응)
# ─────────────────────────────────────────────────────────────────────────
ksic_to_kospi22:

  # === 금융업 ===
  기타 금융업: 금융업                 # 지주회사 다수 → 사업 실체 기준 ticker_overrides 로 재분류 가능
  금융 지원 서비스업: 금융업          # 증권사 등
  보험업: 금융업
  은행 및 저축기관: 금융업
  재 보험업: 금융업

  # === 화학 ===
  기초 화학물질 제조업: 화학
  기타 화학제품 제조업: 화학
  고무제품 제조업: 화학
  플라스틱제품 제조업: 화학
  석유 정제품 제조업: 화학           # SK이노베이션, S-Oil

  # === 음식료품 ===
  기타 식품 제조업: 음식료품
  알코올음료 제조업: 음식료품        # 하이트진로
  비알코올음료 및 얼음 제조업: 음식료품  # 롯데칠성
  담배 제조업: 음식료품              # KT&G (KRX 공식 분류도 음식료품)

  # === 전기전자 ===
  전자부품 제조업: 전기전자
  통신 및 방송 장비 제조업: 전기전자  # 삼성전자, LG전자 등
  일차전지 및 이차전지 제조업: 전기전자  # 2차전지 대부분
  "전동기, 발전기 및 전기 변환 · 공급 · 제어 장치 제조업": 전기전자
  반도체 제조업: 전기전자            # SK하이닉스, DB하이텍

  # === 기계 ===
  일반 목적용 기계 제조업: 기계
  특수 목적용 기계 제조업: 기계

  # === 운수장비 ===
  선박 및 보트 건조업: 운수장비
  자동차 신품 부품 제조업: 운수장비
  "항공기,우주선 및 부품 제조업": 운수장비
  자동차용 엔진 및 자동차 제조업: 운수장비  # 현대차, 기아
  무기 및 총포탄 제조업: 운수장비    # 방산 (LIG디펜스) — KRX 운수장비 관례

  # === 건설업 ===
  건물 건설업: 건설업
  토목 건설업: 건설업
  전기 및 통신 공사업: 건설업        # 한전KPS

  # === 통신업 ===
  전기 통신업: 통신업                # SKT, KT, LGU+

  # === 유통업 ===
  종합 소매업: 유통업
  기타 전문 도매업: 유통업
  무점포 소매업: 유통업              # 홈쇼핑
  상품 종합 도매업: 유통업
  생활용품 도매업: 유통업
  상품 중개업: 유통업
  기타 상품 전문 소매업: 유통업      # 면세점 등

  # === 의약품 ===
  기초 의약물질 제조업: 의약품
  의약품 제조업: 의약품
  자연과학 및 공학 연구개발업: 의약품  # SK바이오팜 등 바이오 R&D

  # === 서비스업 ===
  소프트웨어 개발 및 공급업: 서비스업
  "자료처리, 호스팅, 포털 및 기타 인터넷 정보매개 서비스업": 서비스업  # 카카오, NAVER
  오디오물 출판 및 원판 녹음업: 서비스업  # 엔터 (하이브, SM, JYP)
  유원지 및 기타 오락관련 서비스업: 서비스업
  "건축기술, 엔지니어링 및 관련 기술 서비스업": 서비스업
  "컴퓨터 프로그래밍, 시스템 통합 및 관리업": 서비스업  # 삼성SDS
  여행사 및 기타 여행보조 서비스업: 서비스업
  그외 기타 개인 서비스업: 서비스업  # 코웨이
  광고업: 서비스업                   # 제일기획
  "경비, 경호 및 탐정업": 서비스업   # 에스원

  # === 전기가스업 ===
  전기업: 전기가스업                 # 한국전력
  연료용 가스 제조 및 배관공급업: 전기가스업  # 한국가스공사

  # === 철강금속 ===
  1차 비철금속 제조업: 철강금속      # 고려아연
  1차 철강 제조업: 철강금속          # POSCO홀딩스, 현대제철

  # === 비금속광물 ===
  "시멘트, 석회, 플라스터 및 그 제품 제조업": 비금속광물  # 아이에스동서

  # === 운수창고업 ===
  해상 운송업: 운수창고업            # HMM
  항공 여객 운송업: 운수창고업       # 대한항공
  도로 화물 운송업: 운수창고업       # CJ대한통운

# ─────────────────────────────────────────────────────────────────────────
# 2. 종목 단위 오버라이드
#    자동 매핑이 실 사업과 맞지 않는 종목을 명시 재분류.
#    초기 seeding (2026-04-23 웹 세션): 사업 실체가 명확한 지주회사만 추가.
#    Colab 실데이터 검증 후 `기타 금융업` 잔여 종목을 추가로 재분류한다.
# ─────────────────────────────────────────────────────────────────────────
ticker_overrides:
  # 대기업 지주회사 — 주력 자회사 섹터로 재분류 (사업 실체 명확한 것만)
  "003550": 전기전자      # LG (LG전자/LG화학/LG디스플레이)
  "001040": 음식료품      # CJ (CJ제일제당)
  "078930": 유통업        # GS (GS리테일/GS홈쇼핑; GS칼텍스는 비상장)
  "000880": 운수장비      # 한화 (한화에어로스페이스/한화오션 - 방산+조선 지주)
  "267250": 운수장비      # HD현대 (HD한국조선해양·HD현대중공업 등 조선·건설기계 지주)

  # 2026-04-23 확장 — Colab 회귀 FAIL 진단 후 금융업 편중 해소
  # (12개월 검증 결과: 주도 vs KOSPI -1.1%/월, 2025-09 금융업 단일선정 drag -12.5%)
  "009540": 운수창고업    # 한진칼 (대한항공 지주)
  "000150": 기계          # 두산 (두산에너빌리티·밥캣·로보틱스 중공업·기계 지주)
  "006260": 전기전자      # LS (LS전선·LS일렉트릭)
  "010060": 화학          # OCI (OCI홀딩스 — 폴리실리콘·태양광 화학)
  "004990": 유통업        # 롯데지주 (롯데쇼핑·롯데마트 주력)
  "004800": 화학          # 효성 (효성티앤씨·첨단소재 — 섬유·타이어코드 화학)
  "008930": 의약품        # 한미사이언스 (한미약품 지주)
  "000240": 운수장비      # 한국앤컴퍼니 (한국타이어앤테크놀로지 지주)
  "012630": 건설업        # HDC (HDC현대산업개발 지주)
  "001800": 음식료품      # 오리온홀딩스 (오리온 과자 지주)
  "009970": 유통업        # 영원무역홀딩스 (노스페이스·골드윈 의류 유통)

  # 판단 보류 (Colab 실데이터 + KSIC 자동매핑 확인 후 결정):
  # "034730": SK            # SK Inc.: 순수 투자지주 — SKT·하이닉스·이노베이션 별도 상장. 재분류 불가
  # "377300": 카카오페이    # 핀테크/간편결제 — KRX/통계청 기준 금융업. 유지
  # 금융지주는 "금융업" 유지 (KB/신한/하나/우리/BNK/JB/IBK/메리츠금융 은행지주 + 증권·보험)
