<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소화기내과 개원입지 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f5f0;--white:#fff;--card:#fff;
  --ink:#1a1a1a;--ink2:#444;--ink3:#888;--ink4:#bbb;
  --line:#e0ddd6;--line2:#eee;
  --blue:#2563eb;--blue-bg:#eef3ff;--blue-light:#dbeafe;
  --red:#dc2626;--red-bg:#fef2f2;
  --green:#059669;--green-bg:#ecfdf5;
  --amber:#d97706;--amber-bg:#fffbeb;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow2:0 4px 12px rgba(0,0,0,.08);
  --radius:10px;
}
html{font-size:14px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-env:safe-area-inset-top safe-area-inset-right safe-area-inset-bottom safe-area-inset-left}

/* Header */
header{background:var(--white);border-bottom:1px solid var(--line);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);letter-spacing:-0.5px}
.logo .badge{font-size:10px;background:var(--blue);color:#fff;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.header-meta{font-size:11px;color:var(--ink3)}

/* Tabs */
nav{background:var(--white);border-bottom:1px solid var(--line);padding:0 32px;display:flex;gap:0}
nav button{background:none;border:none;padding:12px 20px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:.15s}
nav button:hover{color:var(--ink2)}
nav button.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* Main */
main{max-width:1200px;margin:0 auto;padding:24px 32px 80px}
.panel{display:none}
.panel.on{display:block}

/* Stat cards row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--ink3);font-weight:500;margin-bottom:4px}
.stat-card .val{font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-1px}
.stat-card .sub{font-size:11px;color:var(--ink4);margin-top:2px}

/* Table */
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line2)}
.tbl-bar h2{font-size:15px;font-weight:700}
.tbl-bar .ctrls{display:flex;gap:8px}
.tbl-bar input,.tbl-bar select{border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--ink)}
.tbl-bar input{width:160px;max-width:100%}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;white-space:nowrap;min-width:640px}
th{text-align:left;padding:8px 14px;font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
th:hover{color:var(--ink)}
th.asc::after{content:' ↑';color:var(--blue)}
th.desc::after{content:' ↓';color:var(--blue)}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--line2)}
tr:hover td{background:#fafaf7}
tr{cursor:pointer}
tr td{-webkit-tap-highlight-color:rgba(37,99,235,.08)}
.rk{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700}
.rk-1{background:var(--amber-bg);color:var(--amber)}
.rk-2{background:#f0f0f0;color:#666}
.rk-3{background:#fdf4e8;color:#b45309}
.rk-n{background:transparent;color:var(--ink3)}

/* Score pill */
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.pill-hi{background:var(--green-bg);color:var(--green)}
.pill-mid{background:var(--blue-bg);color:var(--blue)}
.pill-lo{background:var(--red-bg);color:var(--red)}

/* Mini bar */
.mbar{display:flex;align-items:center;gap:6px}
.mbar-track{width:60px;height:5px;background:var(--line2);border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px}

/* Detail panel */
.detail{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-top:16px;box-shadow:var(--shadow2);display:none;overflow:hidden}
.detail.open{display:block}
.detail-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line2)}
.detail-head h3{font-size:18px;font-weight:800}
.close-btn{width:28px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink3)}
.close-btn:hover{background:var(--line2)}
.detail-body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.detail-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dm{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.dm .dl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px}
.dm .dv{font-size:20px;font-weight:900;margin-top:2px}
.dm .ds{font-size:10px;color:var(--ink4)}
.chart-box{background:var(--bg);border-radius:8px;padding:16px}
.chart-box h4{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--ink2)}

/* Horizontal bar */
.hbar{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.hbar-label{width:60px;text-align:right;font-size:11px;color:var(--ink3);flex-shrink:0}
.hbar-track{flex:1;height:18px;background:var(--line2);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:#fff;min-width:fit-content}
.hbar-val{width:55px;font-size:11px;color:var(--ink2);text-align:right;flex-shrink:0}

/* Today's pick */
.today-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow2);overflow:hidden;margin-bottom:24px}
.today-top{padding:28px 28px 20px;background:linear-gradient(135deg,var(--blue-bg),var(--green-bg));border-bottom:1px solid var(--line2)}
.today-tag{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--blue);font-weight:700;margin-bottom:6px}
.today-name{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink)}
.today-score-line{font-size:13px;color:var(--ink2);margin-top:4px;font-weight:500}
.today-body{padding:24px 28px}
.today-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ts{background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--line)}
.ts .tv{font-size:22px;font-weight:900;color:var(--ink)}
.ts .tl{font-size:10px;color:var(--ink3);margin-top:2px}
.section-block{margin-bottom:18px}
.section-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px;padding-left:10px;border-left:3px solid var(--blue)}
.section-text{font-size:13px;line-height:1.85;color:var(--ink2);padding-left:13px}
.hl{color:var(--green);font-weight:700}
.warn{color:var(--red);font-weight:600}
.nav-btns{display:flex;gap:10px;margin-top:4px}
.nav-btns button{padding:8px 18px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;border:1px solid var(--line)}
.btn-prev{background:var(--card);color:var(--ink2)}
.btn-next{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-jump{background:var(--bg);color:var(--ink3)}

/* Compare */
.cmp-bar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.cmp-bar select{border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;font-family:inherit;background:var(--card);min-width:0;flex:1;max-width:100%}
.cmp-bar .vs{font-weight:800;color:var(--ink4);font-size:16px}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cmp-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.cmp-card h3{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.cmp-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line2);font-size:13px}
.cmp-row .cl{color:var(--ink3)}
.cmp-row .cv{font-weight:700}
.win{color:var(--green)}

/* Responsive - Tablet */
@media(max-width:900px){
  header{padding:14px 16px;flex-direction:column;align-items:flex-start;gap:4px}
  .logo h1{font-size:18px}
  .header-meta{font-size:10px}
  nav{padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{padding:10px 14px;font-size:12px;flex-shrink:0}
  main{padding:14px 16px 60px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:12px 14px}
  .stat-card .val{font-size:22px}
  .tbl-bar{flex-direction:column;align-items:stretch;gap:8px;padding:12px 14px}
  .tbl-bar .ctrls{width:100%}
  .tbl-bar input{flex:1;width:auto}
  .tbl-bar select{flex-shrink:0}
  .detail-body{grid-template-columns:1fr}
  .today-top{padding:20px 18px 16px}
  .today-name{font-size:22px}
  .today-body{padding:16px 18px}
  .today-stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .ts .tv{font-size:18px}
  .cmp-grid{grid-template-columns:1fr}
  .cmp-bar select{min-width:0;flex:1}
  .cmp-bar{gap:8px}
  .cmp-card{padding:16px}
  .cmp-card h3{font-size:15px}
  .section-text{font-size:12px;line-height:1.75}
  .nav-btns{flex-wrap:wrap}
  .nav-btns button{padding:8px 14px;font-size:12px}
}
/* Responsive - Phone */
@media(max-width:480px){
  html{font-size:13px}
  header{padding:12px 14px}
  .logo h1{font-size:16px}
  .logo .badge{font-size:9px;padding:2px 6px}
  nav button{padding:9px 12px;font-size:11px}
  main{padding:10px 12px 50px}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:10px 12px}
  .stat-card .val{font-size:18px}
  .stat-card .label,.stat-card .sub{font-size:10px}
  /* Table: hide less-important cols on phone */
  th:nth-child(7),td:nth-child(7),
  th:nth-child(8),td:nth-child(8){display:none}
  th,td{padding:6px 8px;font-size:11px}
  .rk{width:20px;height:20px;font-size:10px;border-radius:4px}
  .pill{font-size:11px;padding:2px 8px}
  .tbl-bar h2{font-size:13px}
  .detail-head h3{font-size:15px}
  .detail-body{padding:14px}
  .detail-metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .dm{padding:10px}
  .dm .dv{font-size:16px}
  .today-top{padding:16px 14px 12px}
  .today-tag{font-size:9px}
  .today-name{font-size:18px}
  .today-score-line{font-size:11px}
  .today-body{padding:14px}
  .today-stats{gap:6px}
  .ts{padding:8px}
  .ts .tv{font-size:16px}
  .ts .tl{font-size:9px}
  .section-title{font-size:12px}
  .section-text{font-size:11px;padding-left:10px}
  .hbar{gap:4px;margin-bottom:4px}
  .hbar-label{width:44px;font-size:10px}
  .hbar-track{height:16px}
  .hbar-fill{font-size:9px;padding-left:4px}
  .hbar-val{width:44px;font-size:10px}
  .chart-box{padding:12px}
  .chart-box h4{font-size:11px;margin-bottom:8px}
  .cmp-bar select{font-size:12px;padding:6px 10px}
  .cmp-bar .vs{font-size:14px}
  .cmp-card h3{font-size:14px;flex-wrap:wrap;gap:4px}
  .cmp-row{font-size:12px;padding:6px 0}
  .nav-btns button{padding:7px 12px;font-size:11px;flex:1}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>개원입지 분석</h1>
    <span class="badge">소화기내과</span>
  </div>
  <div class="header-meta">이촌동 기준 45분 이내 · 서울 25구 + 경기 생활권 33개 · 심평원 25.12 / 행안부 26.02</div>
</header>

<nav>
  <button class="on" data-p="today">오늘의 분석</button>
  <button data-p="rank">전체 랭킹</button>
  <button data-p="compare">비교분석</button>
</nav>

<main>

        <select id="qRegion"><option value="all">전체</option><option value="서울">서울</option><option value="경기">경기</option></select>
      </div>
    </div>
    <div class="tbl-scroll" style="max-height:70vh;overflow-y:auto">
      <table><thead><tr>
        <th data-s="rank">순위</th>
        <th data-s="zone">생활권</th>
        <th data-s="population">인구</th>
        <th data-s="naegwa_clinics">내과</th>
        <th data-s="pop_per_naegwa">인구/내과</th>
        <th data-s="elderly_ratio">고령%</th>
        <th data-s="middle_aged_ratio">중장년%</th>
        <th data-s="clinic_density">밀도</th>
        <th data-s="composite_score">종합</th>
      </tr></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>
  <div class="detail" id="detailPanel"></div>
</div>

<!-- COMPARE -->
<div class="panel" id="p-compare">
  <div class="cmp-bar">
    <select id="cA"></select>
    <span class="vs">VS</span>
    <select id="cB"></select>
  </div>
  <div class="cmp-grid" id="cmpGrid"></div>
</div>
</main>

// === TODAY ===
function renderToday(){
  let day=parseInt(localStorage.getItem('zDay')||'1');
  const d=D[day-1];
  const analysis=genAnalysis(d);
  const sec=document.getElementById('p-today');
  sec.innerHTML=`
  <div class="today-card">
    <div class="today-top">
      <div class="today-tag">Day ${day} / ${D.length}</div>
      <div class="today-name">${d.zone}</div>
      <div class="today-score-line">종합점수 <strong>${d.composite_score}</strong>점 · 전체 ${d.rank}위 / ${D.length}</div>
    </div>
    <div class="today-body">
      <div class="today-stats">
        <div class="ts"><div class="tv">${fmt(d.population)}</div><div class="tl">인구</div></div>
        <div class="ts"><div class="tv">${d.naegwa_clinics}</div><div class="tl">내과의원</div></div>
        <div class="ts"><div class="tv">${fmt(d.pop_per_naegwa)}</div><div class="tl">내과 1개당 인구</div></div>
        <div class="ts"><div class="tv">${d.elderly_ratio}%</div><div class="tl">65세 이상</div></div>
      </div>
      <div class="section-block"><div class="section-title">분석 선정 이유</div><div class="section-text">${analysis.reason}</div></div>
      <div class="section-block"><div class="section-title">추천 포인트</div><div class="section-text">${analysis.rec}</div></div>
      <div class="section-block"><div class="section-title">유의사항</div><div class="section-text">${analysis.warn}</div></div>
      <div class="section-block"><div class="section-title">4대 지표</div>${renderBars(d)}</div>
      <div class="section-block"><div class="section-title">연령 구조</div>${renderAge(d)}</div>
    </div>
  </div>
  <div class="nav-btns">
    <button class="btn-prev" onclick="go(-1)">← 이전</button>
    <button class="btn-next" onclick="go(1)">다음 →</button>
    <button class="btn-jump" onclick="jump()">지역 이동</button>
  </div>`;
}
function go(dir){
  let day=parseInt(localStorage.getItem('zDay')||'1')+dir;
  day=Math.max(1,Math.min(D.length,day));
  localStorage.setItem('zDay',day);
  renderToday();
  window.scrollTo({top:0,behavior:'smooth'});
}
function jump(){
  const q=prompt('생활권 이름 입력 (예: 도봉, 일산, 오포):');
  if(!q)return;
  const i=D.findIndex(d=>d.zone.includes(q));
  if(i>=0){localStorage.setItem('zDay',i+1);renderToday();}
  else alert('찾을 수 없습니다.');
}

function genAnalysis(d){
  const avgPPN=Math.round(D.reduce((s,x)=>s+x.pop_per_naegwa,0)/D.length);
  const avgEld=(D.reduce((s,x)=>s+x.elderly_ratio,0)/D.length).toFixed(1);
  let reason=`종합점수 ${d.composite_score}점(${d.rank}위). `;
  if(d.pop_per_naegwa>avgPPN) reason+=`내과 1개당 인구 ${fmt(d.pop_per_naegwa)}명으로 평균(${fmt(avgPPN)}명)보다 높아 <span class="hl">경쟁이 낮습니다</span>. `;
  else reason+=`내과 1개당 인구 ${fmt(d.pop_per_naegwa)}명으로 경쟁이 있으나 다른 강점이 있습니다. `;
  if(d.population>300000) reason+=`인구 ${fmt(d.population)}명의 대규모 배후 인구 보유.`;
  else if(d.population>100000) reason+=`인구 ${fmt(d.population)}명의 중규모 생활권.`;

  let rec=`인구 ${fmt(d.population)}명, 내과 ${d.naegwa_clinics}개. `;
  rec+=`65세 이상 ${d.elderly_ratio}%(${d.elderly_ratio>parseFloat(avgEld)?'평균 이상':'평균 수준'}), `;
  rec+=`35~64세 중장년 ${d.middle_aged_ratio}%. `;
  if(d.score_competition>60) rec+=`<span class="hl">경쟁 강도 점수 ${d.score_competition.toFixed(0)}점 — 진입 여건 양호.</span> `;
  if(d.hospitals_count>=5) rec+=`종합병원급 ${d.hospitals_count}개로 협진 체계 구축 용이. `;
  if(d.clinic_density<3.5) rec+=`<span class="hl">만명당 내과 ${d.clinic_density}개로 공급 부족 지역.</span> `;

  let warn='';
  if(d.region==='경기') warn+='이촌동에서 출퇴근 거리를 감안하세요. ';
  if(d.clinic_density>5) warn+=`<span class="warn">만명당 내과 ${d.clinic_density}개로 포화 수준. 내시경 전문 등 차별화 필수.</span> `;
  if(d.elderly_ratio>23) warn+='고령화율이 높아 건보 수가 중심 진료가 될 가능성. 비급여 모델 병행 검토. ';
  if(d.pop_per_naegwa<1500) warn+=`<span class="warn">인구/내과 ${fmt(d.pop_per_naegwa)}명 — 매우 포화된 지역.</span> `;
  if(d.population<80000) warn+='배후 인구가 8만 미만으로 소규모. 인근 생활권 환자 유입 가능성도 검토. ';
  warn+='동 단위 현장 답사(상권, 유동인구, 임대료)를 반드시 병행하세요.';
  return{reason,rec,warn};
}

function renderBars(d){
  const items=[
    {label:'경쟁↓',val:d.score_competition},
    {label:'고령인구',val:d.score_elderly},
    {label:'총인구',val:d.score_population},
    {label:'중장년',val:d.score_middle_aged}
  ];
  return '<div style="margin-top:8px">'+items.map(m=>`
    <div class="hbar">
      <div class="hbar-label">${m.label}</div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${m.val}%;background:${barColor(m.val)}">${m.val.toFixed(0)}</div></div>
    </div>`).join('')+'</div>';
}

function renderAge(d){
  const ages=[
    {label:'0~14',val:d.age_0_14,color:'var(--blue)'},
    {label:'15~34',val:d.age_15_34,color:'var(--green)'},
    {label:'35~54',val:d.age_35_54,color:'var(--amber)'},
    {label:'55~64',val:d.age_55_64,color:'var(--red)'},
    {label:'65+',val:d.age_65_plus,color:'#7c3aed'}
  ];
  const mx=Math.max(...ages.map(a=>a.val));
  return '<div style="margin-top:8px">'+ages.map(a=>`
    <div class="hbar">
      <div class="hbar-label">${a.label}</div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${a.val/mx*100}%;background:${a.color}">${(a.val/d.population*100).toFixed(1)}%</div></div>
      <div class="hbar-val">${fmt(a.val)}</div>
    </div>`).join('')+'</div>';
}

// === RANKING ===
let sortK='composite_score',sortD='desc',fReg='all',fQ='';

function renderRank(){
  const tPop=D.reduce((s,d)=>s+d.population,0);
  const tN=D.reduce((s,d)=>s+d.naegwa_clinics,0);
  document.getElementById('sumCards').innerHTML=`
    <div class="stat-card"><div class="label">분석 대상</div><div class="val">${D.length}개</div><div class="sub">생활권</div></div>
    <div class="stat-card"><div class="label">총 배후 인구</div><div class="val">${(tPop/10000).toFixed(0)}만</div><div class="sub">${fmt(tPop)}명</div></div>
    <div class="stat-card"><div class="label">내과의원 합계</div><div class="val">${fmt(tN)}</div><div class="sub">평균 ${Math.round(tN/D.length)}개</div></div>
    <div class="stat-card"><div class="label">1위</div><div class="val" style="font-size:18px">${D[0].zone}</div><div class="sub">${D[0].composite_score}점</div></div>`;
  renderTbl();
}

function renderTbl(){
  let f=[...D];
  if(fReg!=='all') f=f.filter(d=>d.region===fReg);
  if(fQ) f=f.filter(d=>d.zone.includes(fQ));
  f.sort((a,b)=>sortD==='asc'?(a[sortK]>b[sortK]?1:-1):(a[sortK]<b[sortK]?1:-1));
  document.querySelectorAll('th').forEach(h=>{h.classList.remove('asc','desc');if(h.dataset.s===sortK)h.classList.add(sortD);});
  document.getElementById('tBody').innerHTML=f.map(d=>{
    const rc=d.rank<=1?'rk-1':d.rank<=2?'rk-2':d.rank<=3?'rk-3':'rk-n';
    const pc=pillClass(d.composite_score);
    const ppnColor=d.pop_per_naegwa>2500?'var(--green)':d.pop_per_naegwa<1500?'var(--red)':'var(--ink)';
    return`<tr onclick="showDetail(${D.indexOf(d)})">
      <td><span class="rk ${rc}">${d.rank}</span></td>
      <td style="font-weight:600">${d.zone}</td>
      <td>${fmt(d.population)}</td>
      <td>${d.naegwa_clinics}</td>
      <td style="font-weight:700;color:${ppnColor}">${fmt(d.pop_per_naegwa)}</td>
      <td>${d.elderly_ratio}%</td>
      <td>${d.middle_aged_ratio}%</td>
      <td>${d.clinic_density}</td>
      <td><span class="pill ${pc}">${d.composite_score}</span></td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('th[data-s]').forEach(h=>{
  h.onclick=()=>{
    const k=h.dataset.s;
    if(sortK===k) sortD=sortD==='asc'?'desc':'asc';
    else{sortK=k;sortD=k==='zone'?'asc':'desc';}
    renderTbl();
  };
});
document.getElementById('qSearch').oninput=e=>{fQ=e.target.value;renderTbl();};
document.getElementById('qRegion').onchange=e=>{fReg=e.target.value;renderTbl();};

function showDetail(i){
  const d=D[i],p=document.getElementById('detailPanel');
  const a=genAnalysis(d);
  p.classList.add('open');
  p.innerHTML=`
    <div class="detail-head"><h3>${d.zone}</h3><div class="close-btn" onclick="document.getElementById('detailPanel').classList.remove('open')">✕</div></div>
    <div class="detail-body">
      <div>
        <div class="detail-metrics">
          <div class="dm"><div class="dl">인구</div><div class="dv">${fmt(d.population)}</div></div>
          <div class="dm"><div class="dl">내과의원</div><div class="dv">${d.naegwa_clinics}</div></div>
          <div class="dm"><div class="dl">인구/내과</div><div class="dv">${fmt(d.pop_per_naegwa)}</div></div>
          <div class="dm"><div class="dl">고령비율</div><div class="dv">${d.elderly_ratio}%</div></div>
          <div class="dm"><div class="dl">중장년</div><div class="dv">${d.middle_aged_ratio}%</div></div>
          <div class="dm"><div class="dl">종합병원</div><div class="dv">${d.hospitals_count}</div></div>
        </div>
        <div class="chart-box" style="margin-top:14px"><h4>연령 구조</h4>${renderAge(d)}</div>
      </div>
      <div>
        <div class="chart-box"><h4>4대 지표 점수</h4>${renderBars(d)}</div>
        <div class="chart-box" style="margin-top:14px"><h4>종합 평가</h4><div style="font-size:12px;line-height:1.7;color:var(--ink2)">${a.rec}</div></div>
      </div>
    </div>`;
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

// === COMPARE ===
function initCmp(){
  const sA=document.getElementById('cA'),sB=document.getElementById('cB');
  D.forEach((d,i)=>{
    const o=`<option value="${i}">${d.rank}위 ${d.zone}</option>`;
    sA.innerHTML+=o; sB.innerHTML+=o;
  });
  sB.value='1';
  sA.onchange=sB.onchange=renderCmp;
  renderCmp();
}

function renderCmp(){
  const a=D[document.getElementById('cA').value];
  const b=D[document.getElementById('cB').value];
  const metrics=[
    {l:'인구',k:'population',f:fmt,hi:true},
    {l:'내과의원',k:'naegwa_clinics',f:v=>v+'개',hi:false},
    {l:'인구/내과',k:'pop_per_naegwa',f:fmt,hi:true},
    {l:'고령비율',k:'elderly_ratio',f:v=>v+'%',hi:true},
    {l:'중장년비율',k:'middle_aged_ratio',f:v=>v+'%',hi:true},
    {l:'내과밀도(만명당)',k:'clinic_density',f:v=>v,hi:false},
    {l:'종합병원',k:'hospitals_count',f:v=>v+'개',hi:null},
    {l:'종합점수',k:'composite_score',f:v=>v+'점',hi:true}
  ];
  document.getElementById('cmpGrid').innerHTML=[a,b].map(d=>{
    const other=d===a?b:a;
    return`<div class="cmp-card">
      <h3>${d.zone}<span class="pill ${pillClass(d.composite_score)}">${d.composite_score}점</span></h3>
      ${metrics.map(m=>{
        const w=m.hi===null?false:m.hi?(d[m.k]>other[m.k]):(d[m.k]<other[m.k]);
        return`<div class="cmp-row"><span class="cl">${m.l}</span><span class="cv${w?' win':''}">${m.f(d[m.k])}${w?' ✓':''}</span></div>`;
      }).join('')}
      <div style="margin-top:14px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">연령 구조</div>${renderAge(d)}</div>
    </div>`;
  }).join('');
}

// INIT
renderToday();
renderRank();
initCmp();
</script>
</body>
</html>
