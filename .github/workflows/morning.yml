name: 모닝 리포트

on:
  schedule:
    - cron: '40 19 * * 0-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Python 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install yfinance pytz requests anthropic pykrx

      - name: 미장 데이터 수집
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python morning_report.py

      - name: 국장 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python kr_report.py

      - name: 개원입지 데이터 수집
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python location_report.py

      - name: Claude 리포트 생성 + 노션 저장
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_report.py
