name: 모닝 리포트

# ⚠️ schedule 트리거 절대 추가 금지.
# cron-job.org 가 KST 06:25 에 workflow_dispatch 로 단일 호출하는 구조
# (ADR / 658e231 / 본 세션 ee63ad1 후속). GitHub 내장 cron 은 고부하 시
# 2~3시간 지연 + cron-job.org 호출과 중복 실행되어 race 유발. 과거에
# 658e231 (4/20) 에서 한 번 제거했으나 d93baf4 (4/23 UZymn 세션) 에서
# 인프라 통째 재생성 시 stale morning.yml 따라 부활한 회귀 사례 있음.
on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 미장 데이터 수집
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python morning_report.py

      - name: 국장 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python kr_report.py

      - name: 섹터 ETF 주도 분석
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python sector_report.py

      - name: 보유 종목 현황 (노션 DB)
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python holdings_report.py

      - name: 데이터 통합 (morning_data.txt + 날짜 스냅샷 + Drive 업로드)
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
          MORNING_PAT: ${{ secrets.MORNING_PAT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        # morning_data.txt (최신판) + morning_data_YYYYMMDD.txt (CDN 캐시 우회) + YYYY/MM/ 아카이브
        # Google Drive(ClaudeMorningData 폴더)에도 최신본 + 날짜본 업로드 → Claude 커넥터용
        # 동시에 workspace에 morning_data.txt 로컬 저장 → 아래 렌더 단계가 읽음
        run: python combine_data.py

      # ─────────────────────────────────────────────────────────
      # Phase 2: v6.2 HTML 리포트 자동 렌더링 + GitHub Pages 배포
      # ─────────────────────────────────────────────────────────
      # combine_data.py 가 로컬 workspace 에 이미 오늘자 morning_data.txt 를 작성
      # 했고, 동시에 Contents API 로 원격에도 push 함 (비동기). 과거 구현은 여기서
      # `git fetch + reset --hard` 로 원격 상태와 맞췄으나 Contents API 의 eventual
      # consistency 로 commit 이 git ref 에 전파 안 된 상태에서 reset 이 어제
      # morning_data.txt 로 롤백되어 어제 데이터로 렌더되는 race 가 있었음
      # (2026-04-23 gh run 24832792291 로 확인).
      #
      # 수정: 로컬 morning_data.txt 를 그대로 사용해 렌더. commit 은 docs/ 만.
      # push 는 rebase + 재시도 루프로 Contents API commit 과 충돌 해소.

      - name: v6.2 HTML 렌더링 + GitHub Pages 배포
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 로컬 morning_data.txt (combine_data 가 방금 쓴 오늘자) 로 렌더
          python -m reports.render_report --input morning_data.txt --output-dir docs

          git add docs/
          if git diff --staged --quiet; then
            echo "docs/ 변경 없음 — 커밋 스킵"
            exit 0
          fi

          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "Daily report ${TODAY} (auto)"

          # combine_data / kr_report / sector_report / holdings_report 등이 workspace
          # 에 쓴 *_data.txt 들이 여전히 unstaged dirty 상태. rebase 가 거부하므로
          # HEAD (방금 만든 docs 커밋) 으로 전면 리셋. docs/ 는 HEAD 에 이미 포함됨.
          git reset --hard HEAD

          # Contents API commit 이 git ref 에 전파 안 됐을 수 있으므로 fetch + rebase +
          # push 재시도. rebase 는 combine_data commit 위에 우리 docs commit 을 올림.
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if ! git rebase "origin/$GITHUB_REF_NAME"; then
              echo "❌ rebase conflict (예상 외) — abort"
              git rebase --abort
              exit 1
            fi
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "✅ push 성공 (attempt $attempt/5)"
              exit 0
            fi
            echo "⏳ push 실패 — Contents API commit 전파 대기 3초 (attempt $attempt/5)"
            sleep 3
          done

          echo "❌ 5회 재시도 후에도 push 실패"
          exit 1

      # ─────────────────────────────────────────────────────────
      # Phase 3: HTML → PDF 변환 + Google Drive 업로드
      # Chrome headless 로 아카이브 HTML 을 PDF 로 변환, docs/archive/ 에 커밋 +
      # Google Drive ClaudeMorningData 폴더에도 업로드 (Claude 커넥터용).
      # ─────────────────────────────────────────────────────────
      - name: Chrome 설치 (PDF 렌더링용)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 한글 폰트 설치 (PDF 렌더링용)
        # 러너 이미지엔 라틴 폰트만 있어서 한글이 □ 로 깨짐.
        # fonts-nanum: 나눔고딕·나눔명조·나눔고딕코딩 (약 10MB).
        # apt update 가 러너 미러 이슈로 가끔 수 분간 hang 되어 60초 타임아웃 설정.
        # 타임아웃돼도 러너 이미지에 캐시된 apt index 로 install 진행 가능.
        run: |
          timeout 60 sudo apt-get update -qq || echo "⚠️ apt update 지연 — 캐시된 index 로 진행"
          sudo apt-get install -y -qq --no-install-recommends fonts-nanum fonts-nanum-coding
          fc-cache -f
          echo "installed Korean fonts (sample):"
          fc-list :lang=ko | head -5

      - name: HTML → PDF + Drive 업로드
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          YMD=$(TZ=Asia/Seoul date +%Y%m%d)
          HTML="docs/archive/report_${YMD}.html"
          PDF="docs/archive/report_${YMD}.pdf"

          if [ ! -f "$HTML" ]; then
            echo "⚠️ HTML 파일이 없습니다: $HTML — PDF 렌더 스킵"
            exit 0
          fi

          python -m reports.render_pdf --html "$HTML" --pdf "$PDF"

          # Drive 업로드 (GDRIVE_* Secrets 누락 시 내부에서 스킵)
          python upload_pdf_to_drive.py "$PDF"

          # 커밋 + Pages 배포
          git add "$PDF"
          if git diff --staged --quiet; then
            echo "PDF 변경 없음 — 커밋 스킵"
          else
            TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
            git commit -m "Daily report PDF ${TODAY} (auto)"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
