name: 모닝 리포트

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Python 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install yfinance pytz requests pykrx numpy

      - name: 미장 데이터 수집
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python morning_report.py

      - name: 국장 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python kr_report.py

      - name: 섹터 ETF 주도 분석
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
        run: python sector_report.py

      - name: 데이터 통합 (morning_data.txt + Gist)
        env:
          MORNINGREPOT: ${{ secrets.GITHUB_TOKEN }}
          MORNING_GIST_TOKEN: ${{ secrets.MORNING_GIST_TOKEN }}
        run: python combine_data.py
