name: 모닝 리포트

on:
  schedule:
    - cron: '0 21 * * 0-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install yfinance pytz requests

      - name: 리포트 실행
        env:
          MORNINGREPOT: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python morning_report.py
